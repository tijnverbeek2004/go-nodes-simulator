# Comprehensive network chaos: packet loss, corruption, reorder, and bandwidth limiting.
nodes:
  image: alpine
  count: 4

events:
  # Inject 30% packet loss on node-1 after 5 seconds.
  - at: 5s
    action: loss
    target: node-1
    params:
      percent: "30"

  # Corrupt 5% of packets on node-2 after 10 seconds.
  - at: 10s
    action: corrupt
    target: node-2
    params:
      percent: "5"

  # Reorder 25% of packets on node-3 (with a base delay for observable effect).
  - at: 15s
    action: reorder
    target: node-3
    params:
      percent: "25"
      delay: "50ms"

  # Duplicate 10% of packets on node-4.
  - at: 20s
    action: duplicate
    target: node-4
    params:
      percent: "10"

  # Throttle bandwidth on all nodes to 1 Mbit/s.
  - at: 30s
    action: bandwidth
    target: node-*
    params:
      rate: "1mbit"

  # Stop one node at the end to see mixed state in the report.
  - at: 40s
    action: stop
    target: node-1
